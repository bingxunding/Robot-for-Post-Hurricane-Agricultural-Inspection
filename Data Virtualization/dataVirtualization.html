<script>
  const polygonPoints = [
    { x: 89, y: 141 },
    { x: 651, y: 90 },
    { x: 676, y: 596 },
    { x: 457, y: 592 },
    { x: 134, y: 280 }
  ];

  const spacing = 35;
  const pointRadius = 4;
  const boundaryPadding = 12;

  const gridLinesGroup = document.getElementById("grid-lines");
  const samplingPointsGroup = document.getElementById("sampling-points");

  let selectedCircle = null;

  function isPointInsidePolygon(point, polygon) {
    let inside = false;

    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
      const xi = polygon[i].x;
      const yi = polygon[i].y;
      const xj = polygon[j].x;
      const yj = polygon[j].y;

      const intersect =
        yi > point.y !== yj > point.y &&
        point.x < ((xj - xi) * (point.y - yi)) / (yj - yi) + xi;

      if (intersect) inside = !inside;
    }

    return inside;
  }

  function createSvgElement(tag) {
    return document.createElementNS("http://www.w3.org/2000/svg", tag);
  }

  function distanceBetweenPoints(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function getClosestPointOnSegment(point, a, b) {
    const abX = b.x - a.x;
    const abY = b.y - a.y;

    const apX = point.x - a.x;
    const apY = point.y - a.y;

    const abLengthSquared = abX * abX + abY * abY;

    if (abLengthSquared === 0) {
      return { x: a.x, y: a.y };
    }

    let t = (apX * abX + apY * abY) / abLengthSquared;
    t = Math.max(0, Math.min(1, t));

    return {
      x: a.x + t * abX,
      y: a.y + t * abY
    };
  }

  function getDistanceToPolygonBoundary(point, polygon) {
    let minDistance = Infinity;

    for (let i = 0; i < polygon.length; i++) {
      const a = polygon[i];
      const b = polygon[(i + 1) % polygon.length];

      const closestPoint = getClosestPointOnSegment(point, a, b);
      const distance = distanceBetweenPoints(point, closestPoint);

      if (distance < minDistance) {
        minDistance = distance;
      }
    }

    return minDistance;
  }

  function randomBetween(min, max, decimals = 1) {
    return Number((Math.random() * (max - min) + min).toFixed(decimals));
  }

  function getMoistureStatus(soilMoisture) {
    if (soilMoisture < 10 || soilMoisture > 60) {
      return "DANGER";
    }

    if (soilMoisture < 20 || soilMoisture > 40) {
      return "CAUTION";
    }

    return "STABLE";
  }

  function getTemperatureStatus(temperature) {
    if (temperature < 5 || temperature > 32) {
      return "DANGER";
    }

    if (temperature < 18 || temperature > 26) {
      return "CAUTION";
    }

    return "STABLE";
  }

  function getEceStatus(ece) {
    if (ece > 4) {
      return "DANGER";
    }

    if (ece > 2) {
      return "CAUTION";
    }

    return "STABLE";
  }

  function getPhStatus(ph) {
    if (ph < 4.5 || ph > 9.0) {
      return "DANGER";
    }

    if (ph < 6.5 || ph > 8.4) {
      return "CAUTION";
    }

    return "STABLE";
  }

  function hasDangerValue(soilMoisture, temperature, ece, ph) {
    return (
      getMoistureStatus(soilMoisture) === "DANGER" ||
      getTemperatureStatus(temperature) === "DANGER" ||
      getEceStatus(ece) === "DANGER" ||
      getPhStatus(ph) === "DANGER"
    );
  }

  function getPointStatus(soilMoisture, temperature, ece, ph) {
    const moistureStatus = getMoistureStatus(soilMoisture);
    const temperatureStatus = getTemperatureStatus(temperature);
    const eceStatus = getEceStatus(ece);
    const phStatus = getPhStatus(ph);

    if ([moistureStatus, temperatureStatus, eceStatus, phStatus].includes("DANGER")) {
      return "Danger";
    }

    if ([moistureStatus, temperatureStatus, eceStatus, phStatus].includes("CAUTION")) {
      return "Caution";
    }

    return "Safe";
  }

  function getStatusColorByStatus(status) {
    if (status === "Safe") {
      return "#66d14f";
    }

    if (status === "Caution") {
      return "#facc15";
    }

    return "#ef4444";
  }

  function calculateHealthScore(soilMoisture, temperature, ece, ph) {
    let score = 100;

    const status = getPointStatus(soilMoisture, temperature, ece, ph);

    if (status === "Danger") {
      score -= 35;
    } else if (status === "Caution") {
      score -= 18;
    }

    if (soilMoisture < 20 || soilMoisture > 40) score -= 8;
    if (temperature < 18 || temperature > 26) score -= 8;
    if (ece > 2) score -= 8;
    if (ph < 6.5 || ph > 8.4) score -= 8;

    return Math.max(0, Math.min(100, Math.round(score)));
  }

  function getRecommendation(status, soilMoisture, temperature, ece, ph) {
    const recommendations = [];

    if (soilMoisture < 10 || soilMoisture > 60) {
      recommendations.push("Soil Moisture: Delay operations.");
    }

    if (temperature < 5 || temperature > 32) {
      recommendations.push("Temperature: Remove contaminated material / deep clean before reuse.");
    }

    if (ece > 4) {
      recommendations.push("ECe: Stop planting / initiate full soil reclamation.");
    }

    if (ph < 4.5 || ph > 9.0) {
      recommendations.push("pH: Do not use water / treat before reuse.");
    }

    if (recommendations.length === 0) {
      return "All parameters are within the safe range.";
    }

    return recommendations.join("\n");
  }

  function createSamplingPoint(x, y, index) {
    const soilMoisture = randomBetween(5, 65, 1);
    const temperature = randomBetween(2, 36, 1);
    const ece = randomBetween(0.2, 8.5, 1);
    const ph = randomBetween(3.8, 9.5, 1);

    const status = getPointStatus(soilMoisture, temperature, ece, ph);
    const healthScore = calculateHealthScore(soilMoisture, temperature, ece, ph);

    return {
      id: `N-${index}`,
      x,
      y,
      type: "inner",

      soilMoisture,
      temperature,
      ece,
      ph,

      status,
      statusColor: getStatusColorByStatus(status),
      healthScore,
      recommendation: getRecommendation(status, soilMoisture, temperature, ece, ph)
    };
  }

  function generateSamplingGrid() {
    const minX = Math.min(...polygonPoints.map(p => p.x));
    const maxX = Math.max(...polygonPoints.map(p => p.x));
    const minY = Math.min(...polygonPoints.map(p => p.y));
    const maxY = Math.max(...polygonPoints.map(p => p.y));

    const grid = [];
    let pointIndex = 1;

    for (let y = minY; y <= maxY; y += spacing) {
      const row = [];

      for (let x = minX; x <= maxX; x += spacing) {
        const point = { x, y };

        const isInside = isPointInsidePolygon(point, polygonPoints);
        const distanceToBoundary = getDistanceToPolygonBoundary(point, polygonPoints);

        if (isInside && distanceToBoundary > boundaryPadding) {
          row.push(createSamplingPoint(x, y, pointIndex));
          pointIndex++;
        } else {
          row.push(null);
        }
      }

      grid.push(row);
    }

    const boundaryPoints = generateBoundaryPoints();

    drawGridLines(grid, boundaryPoints);
    drawSamplingPoints(grid, boundaryPoints);
  }

  function generateBoundaryPoints() {
    const boundaryPoints = [];

    for (let i = 0; i < polygonPoints.length; i++) {
      const start = polygonPoints[i];
      const end = polygonPoints[(i + 1) % polygonPoints.length];

      const edgeLength = distanceBetweenPoints(start, end);
      const count = Math.max(1, Math.floor(edgeLength / spacing));

      for (let j = 0; j <= count; j++) {
        const t = j / count;

        boundaryPoints.push({
          x: start.x + (end.x - start.x) * t,
          y: start.y + (end.y - start.y) * t,
          type: "boundary",
          id: `B-${boundaryPoints.length + 1}`,
          statusColor: "#ffffff"
        });
      }
    }

    return boundaryPoints;
  }

  function drawGridLines(grid, boundaryPoints) {
    gridLinesGroup.innerHTML = "";

    const allInnerPoints = [];

    for (let rowIndex = 0; rowIndex < grid.length; rowIndex++) {
      for (let colIndex = 0; colIndex < grid[rowIndex].length; colIndex++) {
        const currentPoint = grid[rowIndex][colIndex];

        if (!currentPoint) continue;

        allInnerPoints.push(currentPoint);

        const rightPoint = grid[rowIndex][colIndex + 1];
        const bottomPoint = grid[rowIndex + 1]?.[colIndex];

        if (rightPoint) {
          drawLine(currentPoint, rightPoint);
        }

        if (bottomPoint) {
          drawLine(currentPoint, bottomPoint);
        }
      }
    }

    for (let i = 0; i < boundaryPoints.length; i++) {
      const currentBoundaryPoint = boundaryPoints[i];
      const nextBoundaryPoint = boundaryPoints[(i + 1) % boundaryPoints.length];

      drawLine(currentBoundaryPoint, nextBoundaryPoint);
    }

    boundaryPoints.forEach(boundaryPoint => {
      let nearestInnerPoint = null;
      let nearestDistance = Infinity;

      allInnerPoints.forEach(innerPoint => {
        const distance = distanceBetweenPoints(boundaryPoint, innerPoint);

        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearestInnerPoint = innerPoint;
        }
      });

      if (nearestInnerPoint && nearestDistance <= spacing * 1.25) {
        drawLine(boundaryPoint, nearestInnerPoint);
      }
    });
  }

  function drawLine(p1, p2) {
    const line = createSvgElement("line");

    line.setAttribute("x1", p1.x);
    line.setAttribute("y1", p1.y);
    line.setAttribute("x2", p2.x);
    line.setAttribute("y2", p2.y);
    line.setAttribute("stroke", "rgba(255,255,255,0.28)");
    line.setAttribute("stroke-width", "1");
    line.setAttribute("pointer-events", "none");

    gridLinesGroup.appendChild(line);
  }

  function drawSamplingPoints(grid, boundaryPoints) {
    samplingPointsGroup.innerHTML = "";

    grid.forEach(row => {
      row.forEach(point => {
        if (!point) return;

        drawSamplingCircle(point, point.statusColor, point.id, pointRadius, true);
      });
    });

    boundaryPoints.forEach(point => {
      drawSamplingCircle(point, "#ffffff", point.id, pointRadius * 0.85, false);
    });
  }

  function drawSamplingCircle(point, color, zoneId, radius, clickable) {
    const circle = createSvgElement("circle");

    circle.setAttribute("cx", point.x);
    circle.setAttribute("cy", point.y);
    circle.setAttribute("r", radius);
    circle.setAttribute("fill", color);
    circle.setAttribute("stroke", "rgba(255,255,255,0.9)");
    circle.setAttribute("stroke-width", "1.2");
    circle.setAttribute("data-zone", zoneId);

    if (clickable) {
      circle.style.cursor = "pointer";
      circle.setAttribute("pointer-events", "auto");

      circle.addEventListener("click", function (event) {
        event.stopPropagation();

        updateRightPanel(point);
        highlightSelectedPoint(circle);
      });
    } else {
      circle.setAttribute("pointer-events", "none");
    }

    samplingPointsGroup.appendChild(circle);
  }

  function highlightSelectedPoint(circle) {
    if (selectedCircle) {
      selectedCircle.setAttribute("stroke", "rgba(255,255,255,0.9)");
      selectedCircle.setAttribute("stroke-width", "1.2");
      selectedCircle.setAttribute("r", pointRadius);
    }

    selectedCircle = circle;

    circle.setAttribute("stroke", "#ffffff");
    circle.setAttribute("stroke-width", "3");
    circle.setAttribute("r", pointRadius + 2);
  }

  function getRiskColor(status) {
    if (status === "STABLE") {
      return "#a8d6a8";
    }

    if (status === "CAUTION") {
      return "#facc15";
    }

    return "#ffb4ab";
  }

  function applyValueColor(element, status) {
    if (!element) return;

    element.style.color = getRiskColor(status);
    element.style.fontWeight = status === "STABLE" ? "500" : "700";

    if (status === "DANGER") {
      element.style.textShadow = "0 0 6px rgba(255,180,171,0.6)";
    } else {
      element.style.textShadow = "none";
    }
  }

  function updateRightPanel(point) {
    const zoneIdEl = document.getElementById("zone-id");
    const zoneStatusEl = document.getElementById("zone-status");

    const soilMoistureEl = document.getElementById("soil-moisture");
    const temperatureEl = document.getElementById("temperatureId");
    const eceEl = document.getElementById("eceId");
    const phEl = document.getElementById("phId");
    const recommendationEl = document.getElementById("recommendation");

    const fieldHealthScoreEl = document.getElementById("field-health-score");
    const fieldHealthLabelEl = document.getElementById("field-health-label");
    const healthScoreRingEl = document.getElementById("health-score-ring");
    const trendCurrentBarEl = document.getElementById("trend-current-bar");

    const thresholdSalinityEl = document.getElementById("threshold-salinity");
    const thresholdMoistureEl = document.getElementById("threshold-moisture");
    const thresholdCompactionEl = document.getElementById("threshold-compaction");

    const salinityBadgeEl = document.getElementById("salinity-status-badge");
    const moistureBadgeEl = document.getElementById("moisture-status-badge");
    const compactionBadgeEl = document.getElementById("compaction-status-badge");

    const mainInsightTitleEl = document.getElementById("main-insight-title");
    const mainInsightDescriptionEl = document.getElementById("main-insight-description");
    const mainInsightIconEl = document.getElementById("main-insight-icon");

    const moistureStatus = getMoistureStatus(point.soilMoisture);
    const temperatureStatus = getTemperatureStatus(point.temperature);
    const eceStatus = getEceStatus(point.ece);
    const phStatus = getPhStatus(point.ph);

    const hasDangerRecommendation =
      moistureStatus === "DANGER" ||
      temperatureStatus === "DANGER" ||
      eceStatus === "DANGER" ||
      phStatus === "DANGER";

    if (zoneIdEl) zoneIdEl.textContent = point.id;

    if (zoneStatusEl) {
      zoneStatusEl.textContent = point.status.toUpperCase();
      zoneStatusEl.className = "px-xs py-[2px] text-[8px] font-black rounded uppercase";

      if (point.status === "Safe") {
        zoneStatusEl.classList.add("bg-primary/20", "text-primary");
      } else if (point.status === "Caution") {
        zoneStatusEl.classList.add("bg-yellow-500/20", "text-yellow-300");
      } else {
        zoneStatusEl.classList.add("bg-error/20", "text-error");
      }
    }

    if (soilMoistureEl) {
      soilMoistureEl.textContent = `${point.soilMoisture}%`;
      applyValueColor(soilMoistureEl, moistureStatus);
    }

    if (temperatureEl) {
      temperatureEl.textContent = `${point.temperature} °C`;
      applyValueColor(temperatureEl, temperatureStatus);
    }

    if (eceEl) {
      eceEl.textContent = `${point.ece} dS/m`;
      applyValueColor(eceEl, eceStatus);
    }

    if (phEl) {
      phEl.textContent = point.ph;
      applyValueColor(phEl, phStatus);
    }

    if (recommendationEl) {
      recommendationEl.textContent = point.recommendation;

      if (hasDangerRecommendation) {
        recommendationEl.style.color = "#ffb4ab";
        recommendationEl.style.fontWeight = "700";
        recommendationEl.style.textShadow = "0 0 6px rgba(255,180,171,0.6)";
      } else {
        recommendationEl.style.color = "#a8d6a8";
        recommendationEl.style.fontWeight = "500";
        recommendationEl.style.textShadow = "none";
      }
    }

    if (fieldHealthScoreEl) {
      fieldHealthScoreEl.textContent = point.healthScore;
    }

    if (fieldHealthLabelEl) {
      if (point.healthScore >= 75) {
        fieldHealthLabelEl.textContent = "OPTIMAL";
        fieldHealthLabelEl.className = "text-[10px] font-bold text-primary tracking-widest";
      } else if (point.healthScore >= 50) {
        fieldHealthLabelEl.textContent = "CAUTION";
        fieldHealthLabelEl.className = "text-[10px] font-bold text-yellow-300 tracking-widest";
      } else {
        fieldHealthLabelEl.textContent = "DANGER";
        fieldHealthLabelEl.className = "text-[10px] font-bold text-error tracking-widest";
      }
    }

    if (healthScoreRingEl) {
      const circumference = 364.4;
      const dashOffset = circumference * (1 - point.healthScore / 100);
      healthScoreRingEl.setAttribute("stroke-dashoffset", dashOffset);
    }

    if (trendCurrentBarEl) {
      trendCurrentBarEl.style.height = `${point.healthScore}%`;
    }

    if (thresholdSalinityEl) {
      thresholdSalinityEl.textContent = point.ece;
      applyValueColor(thresholdSalinityEl, eceStatus);
    }

    if (thresholdMoistureEl) {
      thresholdMoistureEl.textContent = point.soilMoisture;
      applyValueColor(thresholdMoistureEl, moistureStatus);
    }

    if (thresholdCompactionEl) {
      thresholdCompactionEl.textContent = point.ph;
      applyValueColor(thresholdCompactionEl, phStatus);
    }

    updateBadge(salinityBadgeEl, eceStatus);
    updateBadge(moistureBadgeEl, moistureStatus);
    updateBadge(compactionBadgeEl, phStatus);

    if (mainInsightTitleEl) {
      if (point.status === "Safe") {
        mainInsightTitleEl.textContent = `Stable Condition: ${point.id}`;
      } else if (point.status === "Caution") {
        mainInsightTitleEl.textContent = `Attention Needed: ${point.id}`;
      } else {
        mainInsightTitleEl.textContent = `Critical Risk: ${point.id}`;
      }
    }

    if (mainInsightDescriptionEl) {
      mainInsightDescriptionEl.textContent = point.recommendation;

      if (hasDangerRecommendation) {
        mainInsightDescriptionEl.style.color = "#ffb4ab";
        mainInsightDescriptionEl.style.fontWeight = "700";
      } else {
        mainInsightDescriptionEl.style.color = "#a8d6a8";
        mainInsightDescriptionEl.style.fontWeight = "500";
      }
    }

    if (mainInsightIconEl) {
      if (point.status === "Safe") {
        mainInsightIconEl.textContent = "check_circle";
      } else if (point.status === "Caution") {
        mainInsightIconEl.textContent = "warning";
      } else {
        mainInsightIconEl.textContent = "error";
      }
    }
  }

  function updateBadge(element, status) {
    if (!element) return;

    element.textContent = status;
    element.className = "px-xs py-[2px] text-[8px] font-black rounded";

    if (status === "STABLE") {
      element.classList.add("bg-primary/20", "text-primary");
    } else if (status === "CAUTION") {
      element.classList.add("bg-yellow-500/20", "text-yellow-300");
    } else {
      element.classList.add("bg-error/20", "text-error");
    }
  }

  generateSamplingGrid();
</script>
